# 量化交易助手自我进化系统 Skill 定义
# 兼容 Claude Code, OpenAI, Anthropic, Mistral Hermes, Ollama 等平台的 Tool Calling 规范

name: qtassist_self_evolution_system
description: >
  量化交易助手自我进化系统是一个AI驱动的自动化量化交易辅助系统。
  具备自我学习、模式识别、性能优化、预测分析等能力。
  可帮助AI进行量化交易策略的分析与优化。

version: 1.0.0

# API 端点配置
endpoint:
  base_url: http://localhost:5001
  api_prefix: /api

# 工具定义 (OpenAI Tool Calling 格式)
tools:
  - name: get_system_status
    description: 获取自我进化系统的运行状态
    parameters: {}

  - name: get_performance_metrics
    description: 获取CPU、内存、磁盘等性能指标
    parameters:
      refresh:
        type: boolean
        description: 是否强制刷新数据
        default: false

  - name: get_performance_trend
    description: 获取性能趋势数据用于绘图
    parameters:
      minutes:
        type: integer
        description: 时间范围(分钟)
        default: 5
        enum: [5, 15, 30, 60]

  - name: get_ml_predictions
    description: 获取机器学习预测结果
    parameters:
      prediction_type:
        type: string
        description: 预测类型
        default: all
        enum: [function, performance, anomly, all]

  - name: get_module_status
    description: 获取各功能模块的状态
    parameters: {}

  - name: get_alerts
    description: 获取系统警报
    parameters:
      hours:
        type: integer
        description: 时间范围(小时)
        default: 24

  - name: start_evolution_system
    description: 启动自我进化系统
    parameters: {}

  - name: stop_evolution_system
    description: 停止自我进化系统
    parameters: {}

# 支持的平台
supported_platforms:
  - claude_code
  - openai
  - anthropic
  - mistral_hermes
  - ollama
  - lmstudio
  - llama.cpp
  - custom

# 使用示例
examples:
  - tool: get_system_status
    description: 检查系统是否运行中

  - tool: get_performance_metrics
    description: 获取当前性能数据

  - tool: get_performance_trend
    params:
      minutes: 30
    description: 获取30分钟性能趋势

  - tool: get_ml_predictions
    params:
      prediction_type: function
    description: 预测下一个可能使用的功能